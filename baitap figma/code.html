<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shoes Store</title>
    <link rel="stylesheet" href="code.css">
</head>
<body>

    <!-- Top Header -->
    <header class="top-header">
        <div class="left">
            <span class="icon">🏠</span>
            <span>Hotline: <b>0386541254</b></span>
        </div>

        <div class="logo">
            <img src="logo.png" alt="logo">
        </div>

        <div class="right">
            <span>Việt Nam (VND)</span>
            <span>🔍</span>
            <span>🛒</span>
        </div>
    </header>

    <!-- Navbar -->
    <nav class="navbar">
        <ul>
            <li>Trang chủ ▼</li>
            <li>Cửa hàng ▼</li>
            <li>Thể loại ▼</li>
            <li>Sản phẩm ▼</li>
        </ul>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-text">
            <img src="adidas-logo.png" class="brand" alt="">
            <h1>NEW<br>ARRIVAL</h1>
            <p>
                Lorem ipsum dolor sit amet, consectetur adipiscing elit.
                Sed diam nonummy nibh euismod tincidunt ut laoreet dolore magna aliquam erat volutpat.
            </p>
        </div>

        <div class="hero-image">
            <img src="shoe.png" alt="shoe">
        </div>
    </section>

</body>
</html>
